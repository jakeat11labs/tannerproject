<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tanner's Project has moved →</title>
  <meta name="description" content="Tanner's Project has moved to a new home on Vercel. Redirecting you to tannerjake.vercel.app.">
  <meta name="theme-color" content="#FAF7F2">

  <!-- Auto-redirect after 3 seconds; manual link below for anyone who prefers to click. -->
  <meta http-equiv="refresh" content="3;url=https://tannerjake.vercel.app/">
  <link rel="canonical" href="https://tannerjake.vercel.app/">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #FAF7F2;
      --bg-deep: #F4EFE6;
      --surface: #FFFFFF;
      --ink: #1B1812;
      --ink-soft: #4A463F;
      --ink-faint: #8B867D;
      --rule: #E8E2D6;
      --accent: #C8541E;
      --accent-deep: #A8421A;
      --accent-soft: rgba(200, 84, 30, 0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      background-image: radial-gradient(circle at 50% 0%, var(--bg-deep), var(--bg) 60%);
      color: var(--ink);
      font-family: 'Manrope', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      max-width: 30rem;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 18px;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 1px 2px rgba(27, 24, 18, 0.04),
                  0 12px 40px rgba(27, 24, 18, 0.07);
    }

    .tag {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-deep);
      background: var(--accent-soft);
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-weight: 400;
      font-size: 2.6rem;
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 1rem;
    }

    h1 em { font-style: italic; color: var(--accent); }

    p {
      color: var(--ink-soft);
      font-size: 1.02rem;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      padding: 0.85rem 1.6rem;
      border-radius: 12px;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .btn:hover { background: var(--accent-deep); transform: translateY(-1px); }

    .url {
      display: block;
      margin-top: 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--ink-faint);
    }

    .url a { color: var(--ink-faint); }
    .url a:hover { color: var(--accent); }

    @media (prefers-reduced-motion: no-preference) {
      .card { animation: rise 0.5s ease both; }
      @keyframes rise {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="tag">📚 We've moved</span>
    <h1>Tanner's Project has a <em>new home</em></h1>
    <p>
      This project now lives on Vercel. You'll be redirected automatically in a few
      seconds — or jump straight there below.
    </p>
    <a class="btn" href="https://tannerjake.vercel.app/">
      Go to the new site →
    </a>
    <span class="url">
      <a href="https://tannerjake.vercel.app/">tannerjake.vercel.app</a>
    </span>
  </main>
</body>
</html>
